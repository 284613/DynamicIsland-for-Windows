<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>毛玻璃风格 (Glassmorphism)</title>
<style>
  body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .card {
    width: 320px; height: 180px; border-radius: 32px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    padding: 24px; box-sizing: border-box;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative; overflow: hidden;
  }
  .header { display: flex; justify-content: space-between; align-items: center; color: #fff; }
  .location { font-size: 18px; font-weight: 600; margin: 0; }
  .desc { font-size: 14px; color: rgba(255,255,255,0.6); margin: 4px 0 0 0; }
  .main { display: flex; justify-content: space-between; align-items: flex-end; }
  .temp { font-size: 48px; font-weight: 200; color: #fff; margin: 0; line-height: 1; }
  .icon { position: relative; width: 64px; height: 64px; }
  /* Sun animation */
  .sun { width: 48px; height: 48px; background: linear-gradient(135deg, #FFD700, #FF8C00); border-radius: 50%; box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); position: absolute; top: 8px; left: 8px; animation: pulse 4s infinite alternate; }
  @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); } 100% { transform: scale(1.05); box-shadow: 0 0 40px rgba(255, 140, 0, 0.8); } }
  .label { position: absolute; top: -40px; color: #fff; font-size: 14px; text-align: center; width: 100%; left:0; opacity: 0.5; }
</style>
</head>
<body>
  <div style="position:relative">
    <div class="label">方案 1：Apple 质感毛玻璃 (光晕呼吸渐变)</div>
    <div class="card">
      <div class="header">
        <div>
          <h2 class="location">Beijing</h2>
          <p class="desc">Sunny</p>
        </div>
      </div>
      <div class="main">
        <h1 class="temp">24°</h1>
        <div class="icon">
          <div class="sun"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
