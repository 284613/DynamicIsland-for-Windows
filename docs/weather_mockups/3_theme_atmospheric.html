<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>沉浸式全屏背景 (Atmospheric)</title>
<style>
  body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: system-ui, sans-serif; }
  .card {
    width: 320px; height: 180px; border-radius: 32px;
    background: linear-gradient(to bottom, #1a2a6c, #112b3c, #2b7a78);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    padding: 24px; box-sizing: border-box;
    position: relative; overflow: hidden;
    color: #fff;
  }
  .stars { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
  .star { width: 2px; height: 2px; background: #fff; border-radius: 50%; position: absolute; animation: twinkle 2s infinite; }
  @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; box-shadow: 0 0 5px #fff; } }
  .moon { width: 60px; height: 60px; border-radius: 50%; box-shadow: inset -15px -5px 0 0 #fff; position: absolute; top: 20px; right: 20px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); animation: sway 6s ease-in-out infinite; }
  @keyframes sway { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(10deg); } }
  .content { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; }
  .location { font-size: 16px; opacity: 0.8; margin: 0; }
  .temp { font-size: 56px; font-weight: 300; margin: 0; line-height: 1.1; }
  .label { position: absolute; top: -40px; color: #fff; font-size: 14px; text-align: center; width: 100%; left:0; opacity: 0.5; }
</style>
</head>
<body>
  <div style="position:relative">
    <div class="label">方案 3：全屏氛围沉浸 (全局渐变 + 粒子/星空/云雾)</div>
    <div class="card">
      <div class="stars">
        <div class="star" style="top: 20%; left: 30%; animation-delay: 0s;"></div>
        <div class="star" style="top: 40%; left: 60%; animation-delay: 0.5s;"></div>
        <div class="star" style="top: 10%; left: 80%; animation-delay: 1s;"></div>
        <div class="star" style="top: 50%; left: 20%; animation-delay: 1.5s;"></div>
      </div>
      <div class="moon"></div>
      <div class="content">
        <h1 class="temp">18°</h1>
        <h2 class="location">Tokyo • Clear Night</h2>
      </div>
    </div>
  </div>
</body>
</html>
