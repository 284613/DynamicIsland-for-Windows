<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>新拟态暗黑 (Neumorphism)</title>
<style>
  body { background: #2b2b2b; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: "Segoe UI", sans-serif; }
  .card {
    width: 320px; height: 180px; border-radius: 32px;
    background: #2b2b2b;
    box-shadow: 10px 10px 20px #1a1a1a, -10px -10px 20px #3c3c3c;
    padding: 24px; box-sizing: border-box;
    display: flex; justify-content: space-between; align-items: center;
    color: #e0e0e0;
  }
  .left { display: flex; flex-direction: column; justify-content: center; }
  .location { font-size: 16px; color: #888; margin: 0 0 8px 0; }
  .temp { font-size: 56px; font-weight: bold; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
  .icon-box {
    width: 80px; height: 80px; border-radius: 50%;
    background: #2b2b2b;
    box-shadow: inset 5px 5px 10px #1a1a1a, inset -5px -5px 10px #3c3c3c;
    display: flex; justify-content: center; align-items: center;
  }
  .icon-inner {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(145deg, #ff9a9e, #fecfef);
    box-shadow: 0 0 15px rgba(255, 154, 158, 0.6);
    animation: breathe 3s ease-in-out infinite;
  }
  @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); box-shadow: 0 0 25px rgba(255, 154, 158, 0.9); } }
  .label { position: absolute; top: -40px; color: #fff; font-size: 14px; text-align: center; width: 100%; left:0; opacity: 0.5; }
</style>
</head>
<body>
  <div style="position:relative">
    <div class="label">方案 4：暗黑新拟态 (立体凹凸材质 + 内嵌发光物)</div>
    <div class="card">
      <div class="left">
        <h2 class="location">Paris</h2>
        <h1 class="temp">22°</h1>
      </div>
      <div class="icon-box">
        <div class="icon-inner"></div>
      </div>
    </div>
  </div>
</body>
</html>
